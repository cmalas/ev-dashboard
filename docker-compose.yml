
services:
  postgres:
    image: postgres:16-alpine
    container_name: ev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evdashboard
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evuser -d evdashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ev_redis
    restart: unless-stopped
    networks:
      - ev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  poller:
    build:
      context: ./poller
      dockerfile: Dockerfile
    container_name: ev_poller
    restart: unless-stopped
    environment:
      ODDS_API_KEY: ${ODDS_API_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_DB: evdashboard
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ev_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: evdashboard
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ev_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ev_frontend
    restart: unless-stopped
    networks:
      - ev_network

  nginx:
    image: nginx:alpine
    container_name: ev_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8765}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ev_network

volumes:
  postgres_data:

networks:
  ev_network:
    driver: bridge
